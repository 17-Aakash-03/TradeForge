services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: tradeforge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db/tradeforge_db
      JWT_SECRET_KEY: tradeforge-super-secret-key-2024
      NEWS_API_KEY: 196b0538e52c4281ae8113085bb2d619
      EMAIL_SENDER: tradeaforge17@gmail.com
      EMAIL_PASSWORD: ywgfkbiduxbamfwm
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app/models_saved:/app/app/models_saved

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: